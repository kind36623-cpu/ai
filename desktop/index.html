<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seed AGI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div class="title-bar">
    <div class="title">Seed AGI Desktop</div>
  </div>

  <div class="container">
    <div class="chat-container">
      <div id="chat-box" class="chat-box">
        <div class="message ai">
          <div class="message-content">Hello, I am Seed AGI. How can I assist you today?</div>
        </div>
      </div>
    </div>
    
    <div class="input-container">
      <input type="text" id="user-input" placeholder="Message Seed AGI..." autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
